name: Discord Always Online Bot

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  keep-online:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: npm install
      
    - name: Run bot
      env:
        TOKEN: ${{ secrets.DISCORD_TOKEN }}
      run: |
        echo '{"token":"'$TOKEN'"}' > config.json
        node online.js
